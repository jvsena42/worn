naming:
  FunctionNaming:
    # Allow PascalCase for Composable functions
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  MatchingDeclarationName:
    # expect/actual files use Platform.android.kt / Platform.ios.kt naming
    active: false

complexity:
  TooManyFunctions:
    # Preview composables inflate count but are not real logic
    ignoreAnnotatedFunctions: ['Preview']
  LongParameterList:
    # Composable functions pass many state + callback params with defaults
    ignoreDefaultParameters: true

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 120
  NewLineAtEndOfFile:
    active: true
  UnusedParameter:
    # Compose convention: accept `modifier: Modifier = Modifier` even if unused
    allowedNames: 'modifier'
